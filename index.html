<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Apple House Menu</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .menu-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .menu-image {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <main class="menu-container">
    <img
      class="menu-image"
      src="menu.png"
      alt="Apple House Menu"
    >
  </main>
</body>
</html>
